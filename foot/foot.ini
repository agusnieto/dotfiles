[main]
font=AnonymiceProNerdFont:size=10

dpi-aware=yes
pad=20x20

locked-title=no
bold-text-in-bright=no
selection-target=clipboard

[security]
osc52=enabled

[bell]
system=no
urgent=no
notify=no
visual=no

[scrollback]
lines=1000
multiplier=5.0
indicator-position=none
#indicator-format=percentage

[url]
launch=xdg-open ${url}
regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www\.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]+|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*')+([0-9a-zA-Z/#@$&*+=~_%^\-]|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*'))

[cursor]
style=block
unfocused-style=none
blink=yes
blink-rate=500

[colors]
cursor=000000 ffffff

background=0a0a0a
foreground=ffffff

regular0=16181a
regular1=ff6e5e
regular2=5eff6c
regular3=f1ff5e
regular4=5ea1ff
regular5=bd5eff
regular6=5ef1ff
regular7=ffffff
bright0=3c4048
bright1=ff6e5e
bright2=5eff6c
bright3=f1ff5e
bright4=5ea1ff
bright5=bd5eff
bright6=5ef1ff
bright7=ffffff

alpha=0.5
alpha-mode=default

[csd]
preferred=server

[key-bindings]
scrollback-up-page=none
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=none
scrollback-down-half-page=none
scrollback-down-line=none
scrollback-home=none
scrollback-end=none
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=none
search-start=none
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
spawn-terminal=none
minimize=none
maximize=none
fullscreen=none
pipe-visible=none
pipe-scrollback=none
pipe-selected=none
pipe-command-output=none
show-urls-launch=none
show-urls-copy=none
show-urls-persistent=none
prompt-prev=none
prompt-next=none
unicode-input=none
color-theme-switch-1=none
color-theme-switch-2=none
color-theme-toggle=none
noop=none
quit=none

[search-bindings]
cancel=none
commit=none
find-prev=none
find-next=none
cursor-left=none
cursor-left-word=none
cursor-right=none
cursor-right-word=none
cursor-home=none
cursor-end=none
delete-prev=none
delete-prev-word=none
delete-next=none
delete-next-word=none
delete-to-start=none
delete-to-end=none
extend-char=none
extend-to-word-boundary=none
extend-to-next-whitespace=none
extend-line-down=none
extend-backward-char=none
extend-backward-to-word-boundary=none
extend-backward-to-next-whitespace=none
extend-line-up=none
clipboard-paste=none
primary-paste=none
unicode-input=none
scrollback-up-page=none
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=none
scrollback-down-half-page=none
scrollback-down-line=none
scrollback-home=none
scrollback-end=none

[url-bindings]
cancel=none
toggle-url-visible=none
